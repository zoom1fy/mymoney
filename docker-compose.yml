services:
  db:
    image: mysql:8.0
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${NESTJS_PORT}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME}
      - NODE_ENV=${NODE_ENV}
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${NEXTJS_PORT}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - app-network
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      PMA_ARBITRARY: 1
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./Modelfile:/Modelfile:ro # ← твой Modelfile должен лежать в корне проекта
    restart: always
    networks:
      - app-network
    entrypoint: [ "/bin/sh" ] # ← вот это главное исправление
    command:
      - "-c"
      - |
        ollama serve &
        sleep 10
        echo "=== Скачиваем базовую модель (если нет) ==="
        ollama pull llama3.1 || true
        echo "=== Создаём финансовую модель ==="
        ollama create financial-advisor -f /Modelfile || true
        echo "=== Ollama готов! ==="
        tail -f /dev/null
volumes:
  db_data:
  ollama_data:
networks:
  app-network:
    driver: bridge
