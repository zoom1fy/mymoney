name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  check-lockfile:
    name: Check Lockfile Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check backend package-lock.json
        run: |
          cd backend
          if ! npm ls --package-lock-only 2>/dev/null; then
            echo "❌ backend/package-lock.json is out of sync with package.json"
            exit 1
          fi
          echo "✅ backend/package-lock.json is in sync"
      
      - name: Check frontend package-lock.json
        run: |
          cd frontend
          if ! npm ls --package-lock-only 2>/dev/null; then
            echo "❌ frontend/package-lock.json is out of sync with package.json"
            exit 1
          fi
          echo "✅ frontend/package-lock.json is in sync"

  backend-lint:
    name: Backend Lint
    needs: check-lockfile
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
      - name: Run lint
        run: |
          npm run lint || echo "⚠️ Lint warnings found, but continuing..."
      - name: TypeScript check
        run: |
          npx tsc --noEmit || echo "⚠️ TypeScript errors found, but continuing..."

  backend-test:
    name: Backend Tests
    needs: check-lockfile
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: mysql://root:test_password@localhost:3306/test_db
        run: npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: mysql://root:test_password@localhost:3306/test_db
        run: npm test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  backend-build:
    name: Backend Build
    needs: check-lockfile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
      - run: npx prisma generate
      - run: npm run build

  frontend-lint:
    name: Frontend Lint
    needs: check-lockfile
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
      - name: Run lint
        run: |
          npm run lint || echo "⚠️ Lint warnings found, but continuing..."
      - name: TypeScript check
        run: |
          npx tsc --noEmit || echo "⚠️ TypeScript errors found, but continuing..."

  frontend-build:
    name: Frontend Build
    needs: check-lockfile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
      
      - name: Create env file
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:3001/api" >> .env
          echo "NEXT_PUBLIC_SOCKET_URL=http://localhost:3001" >> .env
          echo "NEXT_PUBLIC_COOKIE_DOMAIN=localhost" >> .env
          echo "NODE_ENV=development" >> .env
      
      - run: npm run build

  docker-build:
    name: Docker Build Test
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Show project structure
        run: |
          echo "=== Backend Dockerfiles ==="
          ls -la backend/Dockerfile* 2>/dev/null || echo "No Dockerfiles found"
          echo ""
          echo "=== Frontend Dockerfiles ==="
          ls -la frontend/Dockerfile* 2>/dev/null || echo "No Dockerfiles found"
      
      - name: Create test env file
        run: |
          cat > .env << EOF
          MYSQL_ROOT_PASSWORD=test_password
          MYSQL_DATABASE=test_db
          DATABASE_URL=mysql://root:test_password@db:3306/test_db
          JWT_SECRET=test_secret_key_for_ci
          JWT_ACCESS_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=7d
          REFRESH_TOKEN_COOKIE_NAME=refresh_token
          NODE_ENV=development
          OLLAMA_URL=http://ollama:11434
          OLLAMA_MODEL=financial-advisor
          NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
          NEXT_PUBLIC_API_URL=http://localhost:3001/api
          NEXT_PUBLIC_COOKIE_DOMAIN=localhost
          DOCKER_DEFAULT_PLATFORM=linux/amd64
          EOF
      
      - name: Build with docker-compose.dev.yml (development)
        run: |
          echo "Building with development config..."
          docker compose -f docker-compose.yml -f docker-compose.dev.yml build backend frontend
      
      - name: Build with docker-compose.prod.yml (production)
        run: |
          echo "Building with production config..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend
      
      - name: Start containers
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            up -d

      - name: Wait for startup
        run: sleep 30

      - name: Verify containers are running
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            ps

          if docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            ps | grep -E "Exit|Exited"; then
            echo "❌ Some containers exited"
            exit 1
          fi

      - name: Show logs if failed
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            logs

      - name: Stop containers
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            down -v
      
      - name: Verify Docker images
        run: |
          echo "=== Built Docker images ==="
          docker images

  notify:
    name: Notify
    needs: [check-lockfile, backend-lint, backend-test, backend-build, frontend-lint, frontend-build, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          FAILED_JOBS=""
          WARNING_JOBS=""
          
          if [ "${{ needs.check-lockfile.result }}" != "success" ]; then
            FAILED_JOBS="$FAILED_JOBS ⚠️ Lockfile Check\n"
          fi
          
          if [ "${{ needs.backend-lint.result }}" != "success" ]; then
            WARNING_JOBS="$WARNING_JOBS ⚠️ Backend Lint\n"
          fi
          
          if [ "${{ needs.backend-test.result }}" != "success" ]; then
            FAILED_JOBS="$FAILED_JOBS ❌ Backend Tests\n"
          fi
          
          if [ "${{ needs.backend-build.result }}" != "success" ]; then
            FAILED_JOBS="$FAILED_JOBS ❌ Backend Build\n"
          fi
          
          if [ "${{ needs.frontend-lint.result }}" != "success" ]; then
            WARNING_JOBS="$WARNING_JOBS ⚠️ Frontend Lint\n"
          fi
          
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            FAILED_JOBS="$FAILED_JOBS ❌ Frontend Build\n"
          fi
          
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            FAILED_JOBS="$FAILED_JOBS ❌ Docker Build\n"
          fi
          
          if [ -z "$FAILED_JOBS" ] && [ -z "$WARNING_JOBS" ]; then
            echo "STATUS=success" >> $GITHUB_OUTPUT
            echo "EMOJI=✅" >> $GITHUB_OUTPUT
            echo "RESULT=Successful" >> $GITHUB_OUTPUT
          elif [ -z "$FAILED_JOBS" ]; then
            echo "STATUS=success" >> $GITHUB_OUTPUT
            echo "EMOJI=⚠️" >> $GITHUB_OUTPUT
            echo "RESULT=Successful with warnings" >> $GITHUB_OUTPUT
          else
            echo "STATUS=failure" >> $GITHUB_OUTPUT
            echo "EMOJI=❌" >> $GITHUB_OUTPUT
            echo "RESULT=Failed" >> $GITHUB_OUTPUT
          fi
          
          echo "FAILED_JOBS=$FAILED_JOBS" >> $GITHUB_OUTPUT
          echo "WARNING_JOBS=$WARNING_JOBS" >> $GITHUB_OUTPUT
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ steps.status.outputs.EMOJI }} CI Pipeline ${{ steps.status.outputs.RESULT }}
            
            📦 Repository: ${{ github.repository }}
            🌿 Branch: ${{ github.ref_name }}
            👤 Author: ${{ github.actor }}
            💬 Message: ${{ github.event.head_commit.message }}
            
            Critical Jobs:
            🔍 Lockfile Check: ${{ needs.check-lockfile.result == 'success' && '✅' || '❌' }}
            🧪 Backend Tests: ${{ needs.backend-test.result == 'success' && '✅' || '❌' }}
            🏗️ Backend Build: ${{ needs.backend-build.result == 'success' && '✅' || '❌' }}
            🏗️ Frontend Build: ${{ needs.frontend-build.result == 'success' && '✅' || '❌' }}
            🐳 Docker Build: ${{ needs.docker-build.result == 'success' && '✅' || '❌' }}
            
            Lint Checks:
            🔍 Backend Lint: ${{ needs.backend-lint.result == 'success' && '✅' || '⚠️' }}
            🔍 Frontend Lint: ${{ needs.frontend-lint.result == 'success' && '✅' || '⚠️' }}
            
            🔗 View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}